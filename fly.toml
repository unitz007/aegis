app = "aegis-exec"
primary_region = "lhr"

[http_service]
  internal_port = 8080
  force_https = true
  # auto_stop_machines=false: aegis-exec holds persistent WebSocket / polling
  # connections and must not be stopped between requests. Stopping and
  # cold-starting would break ongoing order-state reconciliation.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpus = 1

[env]
  BROKER_MODE       = "capital"
  ALLOWED_SOURCES   = "finos"
  MIN_RR            = "2.0"
  RISK_PCT          = "0.01"
  MIN_CONFIDENCE    = "45"
